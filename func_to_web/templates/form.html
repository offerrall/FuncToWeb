<div class="functoweb-container">
    {% if title %}
    <h1 class="functoweb-title">{{ title }}</h1>
    {% endif %}
    
    {% if description %}
    <p class="functoweb-description">{{ description }}</p>
    {% endif %}
    
    <pti-form data-action="{{ action }}" params='{{ params_json }}'></pti-form>
</div>
