<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="functoweb-login-body">
    <div class="functoweb-login-container">
        <h1 class="functoweb-login-title">Login</h1>

        {% if error %}
        <p class="functoweb-login-error">{{ error }}</p>
        {% endif %}

        <form method="post" action="/auth" class="functoweb-login-form">
            <div class="functoweb-login-field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="functoweb-login-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="functoweb-login-submit">Login</button>
        </form>
    </div>
</body>
</html>
